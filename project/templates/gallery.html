<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Pixel Art Drawer</title>
    <!-- bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Pixel Art Drawer</a>
            <div class="navbar-nav d-flex flex-row gap-3">
                <a class="nav-link" href="/">Drawer</a>
                <a class="nav-link active" href="/gallery">Gallery</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2 class="text-center mb-4">Community Gallery</h2>

        <div class="row">
            <!-- https://jinja.palletsprojects.com/en/stable/templates/#for jinja loops documentation -->
            {% for art in artworks %}
            <div class="col-md-4 mb-4">
                <div class="border p-3 bg-white text-center">
                    <h5>{{ art.title }}</h5>
                    <p class="text-muted small">{{ art.created_at }}</p>
                    <div class="preview-container border" data-pixels='{{ art.data }}'
                        style="width: 150px; height: 150px; margin: 0 auto;">
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- display when db is empty (no art saved)-->
        {% if not artworks %}
        <div class="text-center">
            <p>No art found yet.</p>
            <a href="/" class="btn btn-primary">Start Drawing</a>
        </div>
        {% endif %}
    </div>

    <script>
        // let the website load first
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('.preview-container').forEach(function (box) {
                // ai was used to help me with this part
                const colors = JSON.parse(box.dataset.pixels);
                const side = Math.sqrt(colors.length);
                box.style.display = 'inline-grid';
                box.style.gridTemplateColumns = 'repeat(' + side + ', 1fr)';
                box.style.gridTemplateRows = 'repeat(' + side + ', 1fr)';

                for (let i = 0; i < colors.length; i++) {
                    const p = document.createElement('div');
                    p.style.backgroundColor = colors[i];
                    box.appendChild(p);
                }

            });
        });
    </script>
</body>

</html>
